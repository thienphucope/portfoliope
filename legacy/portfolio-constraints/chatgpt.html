<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Detective Portfolio</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #000;
  --surface: rgba(30,30,30,0.1);
  --crimson: #8b0000;
  --cyan: #00ffff;
  --text: #ccc;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* Film grain */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.08;
  pointer-events: none;
}

/* NAV */
header {
  position: fixed;
  top: 0;
  width: 100%;
  backdrop-filter: blur(12px);
  background: var(--surface);
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  z-index: 100;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: gray;
  position: relative;
}

nav a:hover {
  color: #ffcc66;
}

nav a::after {
  content: "";
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0%;
  height: 1px;
  border-bottom: 1px dashed #ffcc66;
  transition: 0.4s;
}

nav a:hover::after {
  width: 100%;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* typing */
h1 {
  font-family: 'Courier Prime', monospace;
  font-size: 3rem;
}

h2 {
  margin-top: 10px;
  opacity: 0.7;
}

/* DOSSIER */
.dossier {
  display: grid;
  grid-template-columns: 1fr 1fr;
  padding: 100px;
  gap: 40px;
}

.dossier img {
  width: 100%;
  filter: grayscale(1) contrast(1.4);
}

/* REDACT */
.redact {
  background: black;
  color: transparent;
  transition: 0.4s;
}

.redact:hover {
  color: white;
}

/* CASE FILES */
.cases {
  padding: 100px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  perspective: 1000px;
}

.inner {
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position: relative;
}

.card:hover .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 200px;
  backface-visibility: hidden;
  padding: 20px;
}

.front {
  background: #2a2a2a;
}

.back {
  background: #111;
  transform: rotateY(180deg);
}

/* CONTACT */
footer {
  text-align: center;
  padding: 100px 20px;
}

input {
  background: none;
  border: none;
  border-bottom: 1px solid var(--cyan);
  margin: 10px;
  padding: 10px;
  color: white;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: none;
  border: 1px solid var(--cyan);
  color: var(--cyan);
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 10px var(--cyan);
}
</style>
</head>

<body>

<header>
  <div style="color: cyan;">🧬</div>
  <nav>
    <a href="#">Hồ sơ</a>
    <a href="#">Chứng cứ</a>
    <a href="#">Vụ án</a>
    <a href="#">Manh mối</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1 id="typing"></h1>
  <h2>Software Developer & Systems Investigator</h2>
</section>

<!-- DOSSIER -->
<section class="dossier">
  <img src="https://picsum.photos/400/500"/>
  <div>
    <p>
      Tôi là một <span class="redact">Computer Engineering Student</span>
      với niềm đam mê về <span class="redact">AI Systems</span>.
    </p>
  </div>
</section>

<!-- CASE FILES -->
<section class="cases">
  <div class="card">
    <div class="inner">
      <div class="front">Case #001</div>
      <div class="back">RAG + LLM System</div>
    </div>
  </div>

  <div class="card">
    <div class="inner">
      <div class="front">Case #002</div>
      <div class="back">Genetic Algorithm</div>
    </div>
  </div>
</section>

<!-- CONTACT -->
<footer>
  <h2>Transmit Tip</h2>
  <input placeholder="Name"/>
  <input placeholder="Email"/>
  <br/>
  <button>Truyền tin mật</button>
  <p style="margin-top:40px; opacity:0.5;">© 2026 Encrypted</p>
</footer>

<script>
// typing effect
const text = "Ope Watson";
let i = 0;
function type() {
  if(i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, Math.random()*150 + 50);
  }
}
type();
</script>

</body>
</html>
