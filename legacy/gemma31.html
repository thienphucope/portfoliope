<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mind Palace of Sherlock Holmes</title>
    <style>
        :root {
            --parchment: #f4e4bc;
            --ink: #2c2c2c;
            --blood-red: #8b0000;
            --deep-shadow: #1a1a1a;
            --gold: #c5a059;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--deep-shadow);
            color: var(--ink);
            font-family: 'Georgia', serif;
            overflow: hidden;
            cursor: crosshair;
        }

        /* The Desk - A non-grid, organic layout */
        #desk {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #3d2b1f 0%, #1a1a1a 100%);
            perspective: 1000px;
        }

        /* Floating Elements - The "Clues" */
        .clue {
            position: absolute;
            padding: 20px;
            background: var(--parchment);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
            max-width: 250px;
            border: 1px solid #d2b48c;
            transform-style: preserve-3d;
            z-index: 10;
        }

        .clue:active {
            cursor: grabbing;
            transform: scale(1.05) rotate(2deg);
            box-shadow: 10px 10px 25px rgba(0,0,0,0.7);
            z-index: 1000 !important;
        }

        .clue h3 {
            margin-top: 0;
            font-variant: small-caps;
            border-bottom: 1px solid var(--ink);
            color: var(--blood-red);
        }

        .clue p {
            font-size: 0.9rem;
            line-height: 1.4;
            font-style: italic;
        }

        /* The Magnifying Glass Effect */
        #magnifier {
            position: fixed;
            width: 150px;
            height: 150px;
            border: 8px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(0px) contrast(1.2) brightness(1.1);
            display: none;
        }

        /* The Mind Palace Overlay */
        #mind-palace {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: var(--gold);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        #mind-palace h1 {
            font-size: 3rem;
            font-weight: normal;
            letter-spacing: 10px;
            text-transform: uppercase;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
            52% { opacity: 0.9; }
            54% { opacity: 0.6; }
        }

        /* UI Elements */
        #instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: var(--gold);
            font-style: italic;
            opacity: 0.6;
            pointer-events: none;
            z-index: 100;
        }

        .string {
            position: absolute;
            height: 2px;
            background: var(--blood-red);
            transform-origin: 0 0;
            pointer-events: none;
            opacity: 0.4;
            z-index: 1;
        }

        .stamp {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-weight: bold;
            color: var(--blood-red);
            border: 3px solid var(--blood-red);
            padding: 2px 5px;
            transform: rotate(-15deg);
            text-transform: uppercase;
            font-size: 0.7rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="magnifier"></div>
    <div id="instructions">Drag the clues. Connect the dots. Press ENTER to enter the Mind Palace.</div>

    <div id="desk">
        <!-- Clues will be generated by JS -->
    </div>

    <div id="mind-palace">
        <div>
            <h1>The Mind Palace</h1>
            <p>Data! Data! Data! I cannot make bricks without clay!</p>
            <button onclick="closePalace()" style="background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; cursor: pointer; margin-top: 20px;">Return to the Case</button>
        </div>
    </div>

    <script>
        const cluesData = [
            { title: "The Case of the Blue Carbuncle", text: "A goose, a gem, and a very confused owner. The logic is elementary.", x: 15, y: 20, stamp: "Solved" },
            { title: "A Study in Scarlet", text: "The first meeting. A chemistry lab, a boarding house, and a dead body with 'RACHE' on the wall.", x: 60, y: 15, stamp: "Archive" },
            { title: "The Hound of the Baskervilles", text: "Phosphorescence and ancestral curses. The moor hides many secrets.", x: 40, y: 50, stamp: "Urgent" },
            { title: "The Final Problem", text: "Reichenbach Falls. The clash of two great minds. The end... or is it?", x: 75, y: 60, stamp: "Classified" },
            { title: "The Sign of Four", text: "Agra treasure and a pact of four. A chase through the fog of London.", x: 20, y: 70, stamp: "Solved" },
            { title: "Philosophy", text: "I am a consulting detective. I provide the missing link in the chain of reasoning.", x: 50, y: 30, stamp: "Core" },
            { title: "Aesthetic", text: "Chaos is merely a pattern we haven't decoded yet. Order is found in the details.", x: 80, y: 30, stamp: "Note" }
        ];

        const desk = document.getElementById('desk');
        const magnifier = document.getElementById('magnifier');
        let activeClue = null;
        let offset = { x: 0, y: 0 };

        // Initialize Clues
        cluesData.forEach((data, index) => {
            const div = document.createElement('div');
            div.className = 'clue';
            div.style.left = data.x + 'vw';
            div.style.top = data.y + 'vh';
            div.style.zIndex = index;
            div.innerHTML = `
                <h3>${data.title}</h3>
                <p>${data.text}</p>
                <div class="stamp">${data.stamp}</div>
            `;

            div.addEventListener('mousedown', (e) => {
                activeClue = div;
                const rect = div.getBoundingClientRect();
                offset.x = e.clientX - rect.left;
                offset.y = e.clientY - rect.top;
                div.style.zIndex = 1000;
            });

            desk.appendChild(div);
        });

        document.addEventListener('mousemove', (e) => {
            // Magnifier movement
            magnifier.style.display = 'block';
            magnifier.style.left = e.clientX + 'px';
            magnifier.style.top = e.clientY + 'px';

            if (activeClue) {
                activeClue.style.left = (e.clientX - offset.x) + 'px';
                activeClue.style.top = (e.clientY - offset.y) + 'px';
                updateStrings();
            }
        });

        document.addEventListener('mouseup', () => {
            activeClue = null;
        });

        // Mind Palace Trigger
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('mind-palace').style.display = 'flex';
            }
        });

        function closePalace() {
            document.getElementById('mind-palace').style.display = 'none';
        }

        // Dynamic "Red Strings" connecting clues
        function updateStrings() {
            // Remove old strings
            document.querySelectorAll('.string').forEach(s => s.remove());
            
            const clues = document.querySelectorAll('.clue');
            for (let i = 0; i < clues.length - 1; i++) {
                const start = clues[i].getBoundingClientRect();
                const end = clues[i+1].getBoundingClientRect();
                
                const x1 = start.left + start.width/2;
                const y1 = start.top + start.height/2;
                const x2 = end.left + end.width/2;
                const y2 = end.top + end.height/2;
                
                const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
                const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
                
                const line = document.createElement('div');
                line.className = 'string';
                line.style.width = length + 'px';
                line.style.left = x1 + 'px';
                line.style.top = y1 + 'px';
                line.style.transform = `rotate(${angle}deg)`;
                
                desk.appendChild(line);
            }
        }

        // Initial strings
        window.onload = updateStrings;
    </script>
</body>
</html>
